{% extends 'base.html' %}
{% block content %}

<style>
/* Card Styling */
.card {
    background: #ffffff;
    border-radius: 16px;
}

/* Table Header */
.custom-table thead {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
}

.custom-table thead th {
    border: none;
    padding: 14px;
}

/* Table Rows */
.custom-table tbody tr {
    transition: 0.3s;
}

.custom-table tbody tr:hover {
    background: rgba(102, 126, 234, 0.08);
}

/* Role Badges */
.role-badge {
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 13px;
}

.admin-role {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
}

.user-role {
    background: #e3f2fd;
    color: #1976d2;
}

/* Status Badges */
.status-badge {
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 13px;
}

.active-status {
    background: #e6f4ea;
    color: #2e7d32;
}

.inactive-status {
    background: #f5f5f5;
    color: #757575;
}

/* Header styling */
h2 {
    color: #2c2c2c;
}
</style>

<div class="container-fluid mt-4">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">User Management</h2>
        <span class="badge bg-primary px-3 py-2">Admin Panel</span>
    </div>

    <!-- Card -->
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

            <table class="table align-middle table-hover custom-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for user in users %}
                    <tr>
                        <td class="fw-semibold">{{ user.id }}</td>

                        <td>
                            <span class="fw-semibold text-dark">
                                {{ user.username }}
                            </span>
                        </td>

                        <td>
                            <span class="badge role-badge 
                                {{ 'admin-role' if user.role == 'admin' else 'user-role' }}">
                                {{ user.role|title }}
                            </span>
                        </td>

                        <td>
                            <span class="badge status-badge 
                                {{ 'active-status' if user.is_active else 'inactive-status' }}">
                                {{ 'Active' if user.is_active else 'Inactive' }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

{% endblock %}
