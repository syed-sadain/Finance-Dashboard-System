<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
    body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Fade-in page load */
.login-container {
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.login-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    overflow: hidden;
}

.card-header {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    padding: 2.5rem 2rem;
    text-align: center;
}

.card-body {
    padding: 2.5rem 2.5rem 3rem;
}

.form-label {
    font-weight: 600;
    color: #374151;
}

.form-control {
    border-radius: 12px;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    outline: none;
}

/* Button */
.btn-login {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-weight: 600;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

/* Hover */
.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
}

/* CLICK animation (time-based) */
.btn-login:active {
    transform: scale(0.97);
}

/* Loading pulse animation */
.loading {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% {opacity: 1;}
    50% {opacity: 0.6;}
    100% {opacity: 1;}
}

/* Demo box */
.demo-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 0.95rem;
    border: 1px solid #e2e8f0;
    transition: 0.3s;
}

.demo-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.icon {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    opacity: 0.9;
}
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            
            <!-- Header with Gradient -->
            <div class="card-header">
                <i class="fas fa-chart-line icon"></i>
                <h2 class="mb-1 fw-bold">Finance Dashboard</h2>
                <p class="mb-0 opacity-90">Secure Access Portal</p>
            </div>

            <!-- Login Form -->
            <div class="card-body">
                <h4 class="text-center mb-4 text-dark">Welcome Back</h4>
                
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" 
                                   name="username" 
                                   class="form-control border-start-0" 
                                   placeholder="Enter your username" 
                                   required 
                                   autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" 
                                   name="password" 
                                   class="form-control border-start-0" 
                                   placeholder="Enter your password" 
                                   required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i> Sign In
                    </button>
                </form>

                <!-- Demo Accounts -->
                <div class="demo-box mt-4">
                    <p class="text-muted mb-2 text-center small fw-semibold">Demo Accounts</p>
                    <div class="row text-center small">
                        <div class="col-4">
                            <strong>admin</strong><br>
                            <span class="text-muted">admin123</span>
                        </div>
                        <div class="col-4">
                            <strong>analyst</strong><br>
                            <span class="text-muted">analyst123</span>
                        </div>
                        <div class="col-4">
                            <strong>viewer</strong><br>
                            <span class="text-muted">viewer123</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Note -->
        <div class="text-center mt-4">
            <small class="text-white opacity-75">
                Secure • Role-Based • Finance Management System
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
