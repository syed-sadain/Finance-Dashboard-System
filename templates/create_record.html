{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark">Create New Record</h1>
            <p class="text-muted">Add a new income or expense transaction</p>
        </div>

        <div class="card border-0 shadow">
            <div class="card-header bg-white border-0 py-4">
                <div class="d-flex align-items-center">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3">
                        <i class="fas fa-plus fa-2x text-primary"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-semibold">New Financial Entry</h5>
                        <small class="text-muted">Fill in the details below</small>
                    </div>
                </div>
            </div>

            <div class="card-body p-5">
                <form method="POST">
                    
                    <!-- Amount -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Amount (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">₹</span>
                            <input type="number" 
                                   name="amount" 
                                   step="0.01" 
                                   class="form-control form-control-lg" 
                                   placeholder="0.00" 
                                   required>
                        </div>
                    </div>

                    <!-- Type -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Transaction Type</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <input type="radio" name="type" id="income" value="income" class="btn-check" required>
                                <label for="income" class="btn btn-outline-success w-100 py-3">
                                    <i class="fas fa-arrow-up me-2"></i> Income
                                </label>
                            </div>
                            <div class="col-6">
                                <input type="radio" name="type" id="expense" value="expense" class="btn-check" required>
                                <label for="expense" class="btn btn-outline-danger w-100 py-3">
                                    <i class="fas fa-arrow-down me-2"></i> Expense
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Category -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Category</label>
                        <input type="text" 
                               name="category" 
                               class="form-control form-control-lg" 
                               placeholder="e.g. Salary, Rent, Food, Travel, Investment" 
                               required>
                    </div>

                    <!-- Date -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Date</label>
                        <input type="date" 
                               name="date" 
                               class="form-control form-control-lg" 
                               required>
                    </div>

                    <!-- Notes -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Notes <span class="text-muted small">(Optional)</span></label>
                        <textarea name="notes" 
                                  class="form-control" 
                                  rows="4" 
                                  placeholder="Add any additional details or description..."></textarea>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                        <a href="{{ url_for('records') }}" 
                           class="btn btn-light btn-lg px-5 me-md-2">
                            Cancel
                        </a>
                        <button type="submit" 
                                class="btn btn-primary btn-lg px-5 shadow-sm">
                            <i class="fas fa-save me-2"></i> Create Record
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Helpful Tip -->
        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="fas fa-info-circle me-1"></i>
                Only Admin users can create records
            </small>
        </div>

    </div>
</div>

{% endblock %}
